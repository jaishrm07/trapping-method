# Stage 5 v5b — PEFT-family expanded operator set.
#
# Hypothesis (research/threads/04_hft_defense_landscape.md, finding #5):
# The LoRA-r8 inner loop only teaches the defender to bound exactly
# rank-8 LoRA. Probing at rank=8 then matches what was trained — but
# generalization to other ranks is uncertain (rank-extrapolation null
# hypothesis). v5b expands the operator set to a small rank distribution
# so the defender bounds *the family*, not a single operator:
#
#   trap_operators = [LP, LoRA-r4, LoRA-r8, LoRA-r16, LoRA-r32]
#
# Pure ablation against v4a: only `trap_operators` differs. Same k=3,
# η=0.1, FOMAML, no predictor.
#
# Note: each LoRA branch with FOMAML is similar cost to v4a's single
# LoRA branch, but per-step we now sample over 5 ops instead of 2 →
# defender sees each operator ~1/5 as often. May converge slower; we
# may need to extend iterations to 5000 if RIR doesn't level off.
# Starting at 2500 to compare apples-to-apples first.

seed: 42
image_size: 224

primary:
  dataset: imagenet_val
  root: ./data
  max_train: 10000

harmful:
  dataset: cars
  root: ./data
  max_train: 0

lr: 0.0001
momentum: 0.9
weight_decay: 1.0e-4
batch_size: 64
num_workers: 0
grad_clip: 1.0

lambda_well: 1.0
lambda_ill: 1.0
lambda_trap: 0.3

trap_k_inner: 3
trap_eta_inner: 0.1

trap_operators:
  - linear_probe
  - lora_r4
  - lora_r8
  - lora_r16
  - lora_r32

lora_rank_for:
  lora_r4: 4
  lora_r8: 8
  lora_r16: 16
  lora_r32: 32

lora_variant: v2
use_predictor: false

use_k_inv_preconditioner: true
k_inv_ridge: 1.0e-2

iterations: 2500
log_every: 50
eval_every: 500

rir_num_groups: 20
rir_group_size: 100

results_dir: ./results
run_name: trap_multiop_v5b_peft_family_resnet18_cars
