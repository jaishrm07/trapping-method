# Stage 5 — Plan C multi-operator trap.
# Per defender step, sample one operator from `trap_operators` and use
# its trap loss. Over training, the defender is shaped against the
# operator mixture.
#
# Goal: bound LoRA adversaries as well as linear probing, addressing
# the operator-transfer collapse documented in OPERATOR_TRANSFER_REPORT.md.

seed: 42
image_size: 224

primary:
  dataset: imagenet_val
  root: ./data
  max_train: 10000

harmful:
  dataset: cars
  root: ./data
  max_train: 0

# Optimizer (same Stage-4.5 settings — known to give paper-Pareto profile)
lr: 0.0001
momentum: 0.9
weight_decay: 1.0e-4
batch_size: 64
num_workers: 0
grad_clip: 5.0

# CN regularizers
lambda_well: 1.0
lambda_ill: 1.0

# Trap
lambda_trap: 1.0
trap_k_inner: 3
trap_eta_inner: 0.01

# Plan C — operator-randomization. Per-step uniform sample from this list.
# Start small: LP + LoRA-rank-8. If results are good, expand to LoRA-r32 too.
trap_operators:
  - linear_probe
  - lora_r8

# K^-1 preconditioner (same as Stage 4.5)
use_k_inv_preconditioner: true
k_inv_ridge: 1.0e-3

# Iter budget — slightly higher because the LoRA trap is heavier per step.
iterations: 2500
log_every: 50
eval_every: 500

rir_num_groups: 20
rir_group_size: 100

results_dir: ./results
run_name: trap_multiop_lp_lora8_resnet18_cars
